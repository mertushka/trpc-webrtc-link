name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - name: Verify release tag
        shell: bash
        run: |
          package_version="$(node -p "require('./packages/trpc-webrtc-link/package.json').version")"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: npm run check
      - run: npm publish --workspace @mertushka/trpc-webrtc-link --access public
