name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: mkdir package-artifact
      - run: npm pack --workspace @mertushka/trpc-webrtc-link --pack-destination package-artifact
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: package-artifact/*.tgz
          if-no-files-found: error

  runtime:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19.0
          - 22.18.0
          - 24
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: package-artifact
      - run: node scripts/test-packed-package.mjs --runtime-only --tarball package-artifact/*.tgz
